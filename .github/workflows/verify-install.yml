name: Verify @tyroneross/interface-built-right install

# Smoke-tests the consumer install path against GitHub Packages.
# Auto-runs after every successful publish; can also be triggered manually
# for any version. Uses GITHUB_TOKEN (auto-granted packages:read), so no PAT.

on:
  workflow_run:
    workflows: ["Publish @tyroneross/interface-built-right to GitHub Packages"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to verify (omit to use current package.json)"
        required: false
        default: ""

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest
    # If chained from publish, only run when the publish succeeded.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version to verify
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V=$(node -p "require('./package.json').version")
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Verifying @tyroneross/interface-built-right@$V"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@tyroneross"
          always-auth: true

      # GitHub Packages can lag the publish API by 30-60s. Only wait when
      # we're chained after the publish workflow.
      - name: Wait for GitHub Packages propagation
        if: github.event_name == 'workflow_run'
        run: sleep 45

      - name: Sandbox install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/verify && cd /tmp/verify
          npm init -y >/dev/null
          npm install "@tyroneross/interface-built-right@${{ steps.ver.outputs.version }}"

          # Read the manifest directly. require() would fail because the
          # package's `exports` field doesn't expose ./package.json.
          INSTALLED=$(jq -r .version node_modules/@tyroneross/interface-built-right/package.json)
          if [ "$INSTALLED" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::Installed version ($INSTALLED) does not match requested (${{ steps.ver.outputs.version }})"
            exit 1
          fi

          # Prove the tarball actually shipped real files, not just a manifest.
          FILE_COUNT=$(find node_modules/@tyroneross/interface-built-right -type f | wc -l | tr -d ' ')
          if [ "$FILE_COUNT" -lt 50 ]; then
            echo "::error::Suspiciously small install — only $FILE_COUNT files in node_modules"
            exit 1
          fi

          # Required runtime entrypoints — bin + library + plugin manifests.
          for required in \
            dist/bin/ibr.js \
            dist/index.js \
            dist/index.mjs \
            dist/index.d.ts \
            .claude-plugin/plugin.json \
            .codex-plugin/plugin.json \
            .mcp.json
          do
            if [ ! -e "node_modules/@tyroneross/interface-built-right/$required" ]; then
              echo "::error::Missing required path: $required"
              exit 1
            fi
          done

          echo "::notice::Verified @tyroneross/interface-built-right@$INSTALLED — $FILE_COUNT files installed"
