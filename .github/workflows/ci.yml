name: CI

# Enforce `tsc --noEmit` on every push to main and every pull request.
# Vitest is transpile-only, so tsc is the only thing that catches type
# drift between production schemas and test fixtures. Without this gate,
# errors land silently (as 23 did before this workflow shipped).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: unit (ubuntu — typecheck, lint, tests)
    runs-on: ubuntu-latest
    # Browser-integration tests (real Chrome via CDP) and macOS-native tests do
    # not run here: IBR_UNIT_ONLY excludes the browser files (see vitest.config.ts)
    # and the native tests self-gate to darwin. Both run in the macos-14 job.
    env:
      IBR_UNIT_ONLY: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build package
        run: npm run build

      - name: Run unit test suite
        run: npm test -- --run

      - name: Validate release surfaces and package exports
        run: npm run validate:release

      - name: Inspect package contents
        run: npm pack --dry-run --json --ignore-scripts

  typecheck-web-ui:
    name: typecheck web-ui (tsc --noEmit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  integration-macos:
    name: integration + native (macos-14)
    runs-on: macos-14
    # Authoritative gate: runs the FULL vitest suite (real-Chrome CDP tests +
    # darwin-gated native tests all execute here) plus the Swift package builds.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Build AX extractor
        run: swift build --package-path src/native/swift/ibr-ax-extract -c release

      - name: Build Simulator driver
        run: swift build --package-path mobile-ui/sim-driver -c release

      - name: Run full test suite (browser + native integration)
        run: npm test -- --run
