name: CI

# Enforce `tsc --noEmit` on every push to main and every pull request.
# Vitest is transpile-only, so tsc is the only thing that catches type
# drift between production schemas and test fixtures. Without this gate,
# errors land silently (as 23 did before this workflow shipped).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
