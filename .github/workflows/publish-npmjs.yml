#
# Publishes @tyroneross/interface-built-right to the PUBLIC npm registry
# (registry.npmjs.org) via OIDC Trusted Publishing — NO long-lived token is
# stored or required. npm auto-generates a provenance attestation on publish.
#
# This runs ALONGSIDE `publish-npm.yml`, which publishes the same version to
# GitHub Packages. Both fire on a published GitHub Release. They are independent;
# one failing does not block the other.
#
# ─── ONE-TIME MANUAL PREREQUISITES (cannot be automated — do these once) ──────
# OIDC trusted publishing can only publish UPDATES to a package that already
# exists on npmjs, and only after a trusted publisher is registered. Until both
# are done, this workflow will fail. See docs/PUBLISHING.md for the walkthrough.
#
#   1. Bootstrap-publish v1 manually, from a machine logged into npm
#      (`npm login`), because OIDC cannot create a brand-new package:
#         npm publish --access public --registry https://registry.npmjs.org
#
#   2. On npmjs.com → the package page → Settings → Trusted Publisher, add:
#         Provider:    GitHub Actions
#         Owner/repo:  tyroneross/interface-built-right
#         Workflow:    publish-npmjs.yml
#         Environment: (leave blank — none is configured below)
#
# After that, every published Release runs this workflow with no secret.
# `package.json#repository.url` already matches the repo, which provenance
# verification requires.
# ─────────────────────────────────────────────────────────────────────────────
name: Publish to npmjs (OIDC Trusted Publishing)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run 'npm publish --dry-run' instead of publishing"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write # REQUIRED for OIDC trusted publishing — do NOT remove

jobs:
  publish-npmjs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Node 24 bundles npm >= 11.5.1, the minimum for OIDC trusted publishing.
      # registry-url points the publish at npmjs; do NOT set always-auth/scope —
      # OIDC handles auth, and a stored token would DISABLE trusted publishing.
      # package-manager-cache is disabled for release builds per npm guidance.
      - name: Setup Node (npmjs registry)
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Assert npm >= 11.5.1 (OIDC requirement)
        run: |
          # Upgrade defensively in case the bundled npm ever lags the requirement.
          npm install -g npm@latest
          NPM_V="$(npm --version)"
          echo "npm $NPM_V"
          MAJOR="${NPM_V%%.*}"
          if [ "$MAJOR" -lt 11 ]; then
            echo "::error::npm $NPM_V is below 11.5.1 required for OIDC trusted publishing"
            exit 1
          fi

      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi
          echo "Version match: package.json=$PKG_VERSION tag=$TAG"

      - name: Verify inter-manifest version agreement
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          CLAUDE_PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          CODEX_PLUGIN_VERSION=$(node -p "require('./.codex-plugin/plugin.json').version")
          DRIFT=0
          if [ "$CLAUDE_PLUGIN_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::.claude-plugin/plugin.json version ($CLAUDE_PLUGIN_VERSION) does not match package.json ($PKG_VERSION)"
            DRIFT=1
          fi
          if [ "$CODEX_PLUGIN_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::.codex-plugin/plugin.json version ($CODEX_PLUGIN_VERSION) does not match package.json ($PKG_VERSION)"
            DRIFT=1
          fi
          if [ "$DRIFT" != "0" ]; then
            exit 1
          fi
          echo "All manifests agree on $PKG_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # `--registry` is REQUIRED here: package.json#publishConfig.registry points
      # at GitHub Packages, and would otherwise hijack this publish. The CLI flag
      # overrides publishConfig. `--access public` is required for the scoped
      # @tyroneross package. No NODE_AUTH_TOKEN — OIDC authenticates via the
      # id-token permission, and npm emits a provenance attestation automatically
      # (no --provenance flag needed under trusted publishing).
      - name: Publish to npmjs (dry-run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run --access public --registry https://registry.npmjs.org

      - name: Publish to npmjs (OIDC, provenance auto)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
        run: npm publish --access public --registry https://registry.npmjs.org
